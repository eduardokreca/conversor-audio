name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ffmpeg
        run: brew install ffmpeg

      - name: Instalar dependências Python
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install tkinterdnd2 pyinstaller pillow

      - name: Gerar ícone .icns
        run: |
          python3 -c "from PIL import Image; Image.open('app_icon_1024.png').save('app_icon.icns')"

      - name: Build com PyInstaller
        run: |
          FFMPEG_BIN=$(which ffmpeg)
          python3 -m PyInstaller --onefile --windowed \
            --name "ConversorAudio" \
            --icon "app_icon.icns" \
            --add-binary "$FFMPEG_BIN:." \
            --add-binary "app_icon.png:." \
            conversor_audio.py

      - name: Zipar o .app
        run: |
          cd dist
          zip -r ConversorAudio-mac.zip ConversorAudio.app

      - uses: actions/upload-artifact@v4
        with:
          name: ConversorAudio-mac
          path: dist/ConversorAudio-mac.zip
