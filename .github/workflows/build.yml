name: Build Desktop Apps

on:
  push:
    branches: [main]
    paths-ignore:
      - "index.html"
      - "assets/preview.png"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install tkinterdnd2 pyinstaller pillow

      - name: Baixar ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          $exe = Get-ChildItem -Path ffmpeg_extract -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe

      - name: Instalar Rosetta (macOS)
        if: runner.os == 'macOS'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Instalar Python universal2 (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -o python.pkg https://www.python.org/ftp/python/3.12.10/python-3.12.10-macos11.pkg
          sudo installer -pkg python.pkg -target /
          echo "PY_MAC=/Library/Frameworks/Python.framework/Versions/3.12/bin/python3" >> $GITHUB_ENV

      - name: Baixar ffmpeg estático x86_64 (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          unzip -o -j ffmpeg.zip -d ffmpeg_bin
          chmod +x ffmpeg_bin/ffmpeg
          echo "FFMPEG_MAC=$(pwd)/ffmpeg_bin/ffmpeg" >> $GITHUB_ENV

      - name: Instalar dependências Python x86_64 (macOS)
        if: runner.os == 'macOS'
        run: |
          arch -x86_64 $PY_MAC -m pip install --upgrade pip
          arch -x86_64 $PY_MAC -m pip install tkinterdnd2 pyinstaller pillow

      - name: Gerar ícone .icns (macOS)
        if: runner.os == 'macOS'
        run: arch -x86_64 $PY_MAC -c "from PIL import Image; Image.open('app_icon_1024.png').save('app_icon.icns')"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --windowed `
            --name "ConversorAudio" `
            --icon "app_icon.ico" `
            --add-binary "ffmpeg.exe;." `
            --add-binary "app_icon.ico;." `
            --add-binary "app_icon.png;." `
            conversor_audio.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: |
          arch -x86_64 $PY_MAC -m PyInstaller --onefile --windowed \
            --name "ConversorAudio" \
            --icon "app_icon.icns" \
            --target-architecture x86_64 \
            --add-binary "$FFMPEG_MAC:." \
            --add-binary "app_icon.png:." \
            conversor_audio.py

      - name: Re-assinar app (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - "dist/ConversorAudio.app"

      - name: Empacotar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\ConversorAudio.exe -DestinationPath dist\ConversorAudio-windows.zip

      - name: Empacotar (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ConversorAudio-mac.zip ConversorAudio.app

      - uses: actions/upload-artifact@v4
        with:
          name: ConversorAudio-${{ runner.os }}
          path: dist/ConversorAudio-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Última versão"
          make_latest: true
          files: artifacts/*.zip
